<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapakinstan - Pilih Identitas Bisnis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page-bg {
            background: radial-gradient(circle at top, #ffffff 0%, #f8fafc 100%);
        }
        
        /* Custom CSS to handle selectable cards without Javascript */
        .card-radio:checked + .card-content {
            border-color: #2563EB; /* Tailwind blue-600 */
            background-color: #EFF6FF; /* Tailwind blue-50 */
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1), 0 2px 4px -1px rgba(37, 99, 235, 0.06);
        }
        .card-radio:checked + .card-content .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease-in-out;
        }
        .card-content {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="page-bg min-h-screen text-slate-800">

    <!-- Navigation -->
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center bg-transparent relative z-10">
        <a href="index.html" class="text-2xl font-bold tracking-tighter hover:opacity-80 transition">lapak<span class="text-blue-600">✦</span>instan.</a>
        <div class="hidden md:flex space-x-8 text-sm font-medium">
            <a href="index.html#beranda" class="hover:text-blue-600 transition">Beranda</a>
            <a href="index.html#fitur" class="hover:text-blue-600 transition">Fitur</a>
            <a href="index.html#template" class="hover:text-blue-600 transition">Template</a>
            <a href="index.html#harga" class="hover:text-blue-600 transition">Harga</a>
            <a href="index.html#bantuan" class="hover:text-blue-600 transition">Bantuan</a>
        </div>
        <div class="flex items-center space-x-4">
            <a href="login.html" class="hidden md:block text-sm font-medium hover:text-blue-600">Masuk</a>
            <a href="register.html" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-blue-700 transition">Daftar</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20">
        
        <!-- Header -->
        <div class="mb-16">
            <h1 class="text-4xl md:text-5xl font-bold leading-tight text-slate-900 max-w-3xl">
                AI Kami Sudah Menemukan Nama Terbaik Untukmu! <br class="hidden md:block">
                <span class="text-blue-600">Pilih Identitas Bisnismu</span>
            </h1>
            <p class="mt-4 text-slate-500 text-lg">Sesuaikan pilihan di bawah ini agar website Anda tampil sempurna.</p>
        </div>

        <form action="index.html" method="GET" class="space-y-16">
            
            <section>
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center text-sm">1</div>
                    <h2 class="text-2xl font-bold text-slate-800">Pilih Nama Bisnis</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <label class="cursor-pointer relative">
                        <input type="radio" name="nama_bisnis" value="rasa_nusantara" class="card-radio hidden" checked>
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-6 hover:border-blue-300 h-full">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2 pr-8">Kedai Rasa Nusantara</h3>
                            <p class="text-sm text-slate-500">Klasik, mudah diingat, dan sangat menonjolkan cita rasa lokal.</p>
                        </div>
                    </label>
                    
                    <label class="cursor-pointer relative">
                        <input type="radio" name="nama_bisnis" value="dapur_sedap" class="card-radio hidden">
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-6 hover:border-blue-300 h-full">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2 pr-8">Dapur Sedap Instan</h3>
                            <p class="text-sm text-slate-500">Memberi kesan cepat, praktis, dan rasa yang dijamin enak.</p>
                        </div>
                    </label>
                    
                    <label class="cursor-pointer relative">
                        <!-- Added id="radio-custom-nama" -->
                        <input type="radio" id="radio-custom-nama" name="nama_bisnis" value="custom" class="card-radio hidden">
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-6 hover:border-blue-300 h-full flex flex-col justify-center">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <!-- Added id="custom-nama-title" -->
                            <h3 id="custom-nama-title" class="text-lg font-semibold text-slate-700 mb-3">Tulis nama sendiri</h3>
                            <!-- Added id="custom-nama-input" -->
                            <input type="text" id="custom-nama-input" placeholder="Ketik nama bisnis..." class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 relative z-20" onclick="document.getElementById('radio-custom-nama').checked = true">
                        </div>
                    </label>
                </div>
            </section>

            <!-- SECTION 2: Pilih Palet Warna -->
            <section>
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center text-sm">2</div>
                    <h2 class="text-2xl font-bold text-slate-800">Pilih Identitas Warna</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Color 1 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="warna" value="vibrant" class="card-radio hidden" checked>
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-6 hover:border-blue-300 h-full">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon z-10">
                                <svg class="w-6 h-6 bg-white rounded-full" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <div class="flex h-20 rounded-xl overflow-hidden mb-4 shadow-inner border border-gray-100">
                                <div class="w-1/3 bg-[#3B82F6]"></div>
                                <div class="w-1/3 bg-[#F59E0B]"></div>
                                <div class="w-1/3 bg-[#10B981]"></div>
                            </div>
                            <h3 class="text-lg font-bold text-slate-900">Modern Vibrant</h3>
                            <p class="text-sm text-slate-500 mt-1">Berani, segar, dan profesional.</p>
                        </div>
                    </label>
                    <!-- Color 2 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="warna" value="pastel" class="card-radio hidden">
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-6 hover:border-blue-300 h-full">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon z-10">
                                <svg class="w-6 h-6 bg-white rounded-full" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <div class="flex h-20 rounded-xl overflow-hidden mb-4 shadow-inner border border-gray-100">
                                <div class="w-1/3 bg-[#FDF5E6]"></div>
                                <div class="w-1/3 bg-[#FADADD]"></div>
                                <div class="w-1/3 bg-[#FF9999]"></div>
                            </div>
                            <h3 class="text-lg font-bold text-slate-900">Pastel Manis</h3>
                            <p class="text-sm text-slate-500 mt-1">Lembut, estetis, dan kekinian.</p>
                        </div>
                    </label>
                    <!-- Color 3 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="warna" value="monochrome" class="card-radio hidden">
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-6 hover:border-blue-300 h-full">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon z-10">
                                <svg class="w-6 h-6 bg-white rounded-full" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <div class="flex h-20 rounded-xl overflow-hidden mb-4 shadow-inner border border-gray-100">
                                <div class="w-1/3 bg-[#1E293B]"></div>
                                <div class="w-1/3 bg-[#64748B]"></div>
                                <div class="w-1/3 bg-[#F1F5F9]"></div>
                            </div>
                            <h3 class="text-lg font-bold text-slate-900">Elegan Monokrom</h3>
                            <p class="text-sm text-slate-500 mt-1">Eksklusif, mewah, dan minimalis.</p>
                        </div>
                    </label>
                </div>
            </section>

            <!-- SECTION 3: Pilih Logo Bisnis -->
            <section>
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center text-sm">3</div>
                    <h2 class="text-2xl font-bold text-slate-800">Pilih Logo Bisnis</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Logo 1 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="logo" value="logo1" class="card-radio hidden" checked>
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-8 hover:border-blue-300 h-full flex flex-col items-center text-center">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <!-- Mockup Logo Icon -->
                            <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white mb-5 shadow-lg transform rotate-3">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            </div>
                            <h3 class="text-lg font-bold text-slate-900">Ikonik Dinamis</h3>
                        </div>
                    </label>
                    <!-- Logo 2 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="logo" value="logo2" class="card-radio hidden">
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-8 hover:border-blue-300 h-full flex flex-col items-center text-center">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <!-- Mockup Logo Icon -->
                            <div class="w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center text-white mb-5 shadow-lg border-4 border-slate-100">
                                <span class="font-serif text-3xl font-bold">RN</span>
                            </div>
                            <h3 class="text-lg font-bold text-slate-900">Inisial Minimalis</h3>
                        </div>
                    </label>
                    <!-- Logo 3 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="logo" value="logo3" class="card-radio hidden">
                        <div class="card-content border-2 border-slate-200 bg-white rounded-2xl p-8 hover:border-blue-300 h-full flex flex-col items-center text-center">
                            <div class="absolute top-4 right-4 text-blue-600 check-icon">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            </div>
                            <!-- Mockup Logo Icon -->
                            <div class="w-24 h-24 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600 mb-5 shadow-sm transform -rotate-3 border-2 border-orange-200">
                                <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                            </div>
                            <h3 class="text-lg font-bold text-slate-900">Emblem Abstrak</h3>
                        </div>
                    </label>
                </div>
            </section>

            <div class="pt-8 pb-16 flex justify-center border-t border-slate-200 mt-12">
                <button type="submit" class="bg-blue-600 text-white px-12 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center gap-2 hover:scale-105 transform">
                    Selesai & Lihat Website
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>

        </form>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Look at the URL for "?nama=..."
            const urlParams = new URLSearchParams(window.location.search);
            const passedName = urlParams.get('nama');
            
            // If the user filled out the name in the previous step
            if (passedName && passedName.trim() !== '') {
                
                // 1. Put the name into the custom input field
                const customInput = document.getElementById('custom-nama-input');
                customInput.value = passedName;
                
                // 2. Change the title to indicate this is their choice
                document.getElementById('custom-nama-title').innerText = "Nama Pilihanmu";
                
                // 3. Automatically select the 3rd radio button card
                document.getElementById('radio-custom-nama').checked = true;
                
                // 4. Update the main header to reflect they chose a name
                document.querySelector('h1').innerHTML = `Bagus! Kami telah menyimpan namamu. <br class="hidden md:block"><span class="text-blue-600">Sekarang Pilih Identitas Bisnismu</span>`;
            }
        });
    </script>
</body>
</html>
