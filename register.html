<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapakinstan - Buat Akun Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom bright gradient matching the register mockup */
        .register-bg {
            background: linear-gradient(135deg, #06B6D4 0%, #3B82F6 50%, #4338CA 100%);
            position: relative;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800">

    <div class="flex min-h-screen p-4 lg:p-6 gap-6">
        
        <!-- Left Panel (Hidden on Mobile) -->
        <div class="hidden lg:flex flex-col justify-end w-1/2 register-bg rounded-[2.5rem] p-12 text-white overflow-hidden shadow-2xl relative">
            <div class="absolute top-0 left-0 w-full h-full bg-blue-500 opacity-20 blur-3xl rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
            
            <div class="relative z-10">
                <h1 class="text-5xl font-bold mb-6 leading-tight">Bikin Web Toko<br>Online Tanpa<br>Ribet Koding.</h1>
                <p class="text-blue-100 text-sm max-w-sm leading-relaxed">
                    Ceritakan bisnismu biar AI yang menyusun website profesional siap pakai dalam 5 menit.
                </p>
            </div>
        </div>
        
        <!-- Right Panel (Form) -->
        <div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-6">
            <div class="w-full max-w-md">
                
                <!-- Logo -->
                <a href="index.html" class="block text-2xl font-bold tracking-tighter text-center mb-10 hover:opacity-80 transition">
                    lapak<span class="text-blue-600">✦</span>instan.
                </a>

                <!-- Heading -->
                <h2 class="text-3xl font-bold text-center mb-3">Buat Akun Baru</h2>
                <p class="text-center text-slate-500 text-sm mb-8 leading-relaxed">
                    Masuk untuk mengelola toko online dan<br>pantau perkembangan bisnis Anda.
                </p>

                <!-- Form -->
                <form class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Nama</label>
                        <input type="text" placeholder="Masukkan nama" class="w-full border border-gray-300 bg-transparent rounded-lg px-4 py-3 outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-sm transition placeholder-gray-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Alamat email</label>
                        <input type="email" placeholder="Masukkan alamat email" class="w-full border border-gray-300 bg-transparent rounded-lg px-4 py-3 outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-sm transition placeholder-gray-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Nomor telepon</label>
                        <input type="tel" placeholder="Masukkan nomor telepon" class="w-full border border-gray-300 bg-transparent rounded-lg px-4 py-3 outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-sm transition placeholder-gray-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1.5">Kata sandi</label>
                        <div class="relative">
                            <input type="password" placeholder="Masukkan kata sandi" class="w-full border border-gray-300 bg-transparent rounded-lg px-4 py-3 outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-sm transition placeholder-gray-400 pr-12">
                            <!-- Eye Icon -->
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Buttons -->
                    <div class="pt-4">
                        <button type="button" class="w-full bg-blue-600 text-white rounded-lg py-3.5 font-medium hover:bg-blue-700 transition mb-3 shadow-sm shadow-blue-200 text-sm">
                            Daftar
                        </button>
                        
                        <button type="button" class="w-full border border-gray-300 bg-transparent rounded-lg py-3.5 flex items-center justify-center gap-3 hover:bg-gray-50 transition text-sm font-medium text-slate-700">
                            <!-- Google Logo -->
                            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Daftar dengan Google
                        </button>
                    </div>
                </form>

                <p class="text-center text-sm text-slate-600 mt-8">
                    Sudah punya akun? <a href="login.html" class="text-blue-600 font-semibold hover:text-blue-800 transition">Masuk</a>
                </p>

            </div>
        </div>
    </div>

</body>
</html>
